<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mangalam Catering Services</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,800;1,600&family=DM+Sans:wght@300;400;500&display=swap\" rel="stylesheet">
<style>
/* ── RESET & ROOT ─────────────────────────────────────────────── */
:root{
  --saffron:#E8871A; --deep-red:#8B1A1A; --gold:#D4A82A;
  --cream:#FDF6EC;   --ivory:#FAF3E0;    --charcoal:#2C2C2C;
  --muted:#7A6A5A;   --white:#FFFFFF;    --border:#E8D8C0;
  --success:#2E7D32; --danger:#C62828;
  --shadow:0 4px 24px rgba(139,26,26,.10);
  --shadow-lg:0 8px 48px rgba(139,26,26,.15);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;color:var(--charcoal);background:var(--cream);line-height:1.5;}

/* ── LAYOUT & PAGES ───────────────────────────────────────────── */
header{background:var(--deep-red);color:var(--white);padding:1rem 2rem;display:flex;justify-content:between;align-items:center;box-shadow:var(--shadow);}
header h1{font-family:'Playfair Display',serif;color:var(--gold);}
nav button{background:transparent;border:none;color:var(--ivory);padding:0.5rem 1rem;cursor:pointer;font-size:1rem;font-weight:500;}
nav button:hover, nav button.active{color:var(--saffron);}

.container{max-width:1200px;margin:2rem auto;padding:0 1rem;}
.page{display:none;}
.page.active{display:block;}

/* ── MENU CARD GRID ───────────────────────────────────────────── */
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2rem;margin-top:2rem;}
.menu-card{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:var(--shadow);transition:transform 0.2s;}
.menu-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
.menu-card img{width:100%;height:200px;object-fit:cover;background:var(--ivory);}
.menu-card-body{padding:1.5rem;}
.menu-card-title{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--deep-red);margin-bottom:0.5rem;}
.menu-card-price{color:var(--saffron);font-weight:600;font-size:1.1rem;margin-bottom:0.5rem;}
.menu-card-desc{color:var(--muted);font-size:0.9rem;}

/* ── FORMS & BUTTONS ──────────────────────────────────────────── */
.form-group{margin-bottom:1.25rem;}
.form-group label{display:block;margin-bottom:0.5rem;font-weight:500;color:var(--muted);font-size:0.9rem;}
input, select, textarea{width:100%;padding:0.75rem;border:1px solid var(--border);border-radius:4px;font-family:inherit;font-size:1rem;}
input:focus, select:focus, textarea:focus{outline:none;border-color:var(--saffron);}

.btn{display:inline-block;padding:0.75rem 1.5rem;background:var(--saffron);color:var(--white);border:none;border-radius:4px;cursor:pointer;font-weight:500;font-size:1rem;text-align:center;}
.btn:hover{opacity:0.9;}
.btn-danger{background:var(--danger);}
.btn-secondary{background:var(--muted);}

/* ── TABS INSIDE MODAL ────────────────────────────────────────── */
.tab-header{display:flex;border-bottom:1px solid var(--border);margin-bottom:1rem;}
.tab-btn{flex:1;padding:0.75rem;background:transparent;border:none;cursor:pointer;text-align:center;font-weight:500;color:var(--muted);}
.tab-btn.active{color:var(--saffron);border-bottom:2px solid var(--saffron);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* ── MODAL STRUCTURE ──────────────────────────────────────────── */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:1000;padding:1rem;}
.modal.open{display:flex;}
.modal-wrapper{background:var(--white);padding:2rem;border-radius:8px;width:100%;max-width:500px;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:0.5rem;}
.modal-header h3{font-family:'Playfair Display',serif;color:var(--deep-red);}

/* ── IMAGE PICKER LIBRARY GALLERY ──────────────────────────────── */
.library-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:0.5rem;max-height:200px;overflow-y:auto;border:1px solid var(--border);padding:0.5rem;border-radius:4px;}
.library-item{width:100%;height:80px;object-fit:cover;cursor:pointer;border:2px solid transparent;border-radius:4px;}
.library-item:hover{border-color:var(--saffron);}
.library-item.selected{border-color:var(--success);box-shadow:0 0 8px rgba(46,125,50,0.5);}
.img-preview-box{margin-top:1rem;text-align:center;}
.img-preview-box img{max-width:100%;max-height:120px;border-radius:4px;border:1px solid var(--border);}
</style>
</head>
<body>

<header>
  <h1>Mangalam Catering</h1>
  <nav>
    <button onclick="switchPage('page-menu')" id="nav-menu" class="active">Our Menu</button>
    <button onclick="switchPage('page-admin')" id="nav-admin">Admin Panel</button>
  </nav>
</header>

<div class="container">
  <main id="page-menu" class="page active">
    <div class="menu-grid" id="customer-menu-grid"></div>
  </main>

  <section id="page-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
      <h2>Menu Management Dashboard</h2>
      <button class="btn" onclick="openAddModal()">+ Add New Menu Item</button>
    </div>
    <div class="menu-grid" id="admin-menu-grid"></div>
  </section>
</div>

<div class="modal" id="menu-item-modal">
  <div class="modal-wrapper">
    <div class="modal-header">
      <h3 id="modal-title">Add Menu Item</h3>
      <button style="background:transparent; border:none; font-size:1.5rem; cursor:pointer;" onclick="closeModal('menu-item-modal')">&times;</button>
    </div>
    
    <form id="menu-form" onsubmit="handleFormSubmit(event)">
      <input type="hidden" id="edit-item-id" value="">
      
      <div class="form-group">
        <label for="mi-name">Dish Name</label>
        <input type="text" id="mi-name" placeholder="e.g., Special Masala Dosa" autocorrect="off" autocapitalize="words" spellcheck="false" required>
      </div>
      
      <div class="form-group">
        <label for="mi-price">Price (₹)</label>
        <input type="number" id="mi-price" placeholder="0.00" inputmode="decimal" pattern="[0-9]*" step="0.01" required>
      </div>
      
      <div class="form-group">
        <label for="mi-category">Category</label>
        <select id="mi-category">
          <option value="Breakfast">Breakfast</option>
          <option value="Lunch">Lunch / Meals</option>
          <option value="Sweets">Sweets & Desserts</option>
          <option value="Beverages">Beverages</option>
        </select>
      </div>

      <div class="form-group">
        <label for="mi-description">Description / Key Ingredients</label>
        <textarea id="mi-description" rows="2" placeholder="Briefly describe the catering option..."></textarea>
      </div>

      <div class="form-group" style="margin-top:1.5rem;">
        <label style="font-weight:600; color:var(--charcoal);">Item Banner Image</label>
        
        <div class="tab-header">
          <div class="tab-btn active" id="tab-btn-upload" onclick="switchImgTab('upload')">Upload File</div>
          <div class="tab-btn" id="tab-btn-library" onclick="switchImgTab('library')">Cloud Library</div>
        </div>

        <div class="tab-content active" id="tab-content-upload">
          <input type="file" id="mi-img-file" accept="image/*" onchange="handleFileSelect(event)">
          <p style="font-size:0.8rem; color:var(--muted); margin-top:0.25rem;">Max Size: 5MB (JPG, PNG, WebP, GIF)</p>
        </div>

        <div class="tab-content" id="tab-content-library">
          <div class="library-grid" id="modal-library-grid">
            </div>
        </div>

        <input type="hidden" id="mi-selected-url" value="">
        <input type="hidden" id="mi-selected-filename" value="">

        <div class="img-preview-box" id="preview-box" style="display:none;">
          <p style="font-size:0.8rem; color:var(--muted); margin-bottom:0.25rem;">Selected Image Preview:</p>
          <img id="img-preview-element" src="" alt="Preview">
        </div>
      </div>

      <div style="display:flex; gap:1rem; margin-top:2rem;">
        <button type="button" class="btn btn-secondary" style="flex:1;" onclick="closeModal('menu-item-modal')">Cancel</button>
        <button type="submit" class="btn" style="flex:1;" id="save-btn">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<script>
let menuItems = [];
let targetUploadedFile = null;

// ── APP ROUTING ────────────────────────────────────────────────
function switchPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  
  const targetPage = document.getElementById(pageId);
  if(targetPage) targetPage.classList.add('active');
  
  if(pageId === 'page-menu') document.getElementById('nav-menu').classList.add('active');
  if(pageId === 'page-admin') {
    document.getElementById('nav-admin').classList.add('active');
    loadSyncMenuFromServer(); // Pull data fresh whenever admin logs in
  }
}

function switchImgTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  
  document.getElementById(`tab-btn-${tabId}`).classList.add('active');
  document.getElementById(`tab-content-${tabId}`).classList.add('active');
  
  if (tabId === 'library') {
    fetchCloudLibrary();
  }
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); resetFormFields(); }

// ── FETCH / RENDER MASTER DATA ─────────────────────────────────
function loadSyncMenuFromServer() {
  fetch('/api/menu')
    .then(res => res.json())
    .then(data => {
      if (data.success && data.menuItems) {
        menuItems = data.menuItems;
        renderCustomerMenu();
        renderAdminMenu();
      }
    })
    .catch(err => console.error("Could not fetch sync data:", err));
}

function renderCustomerMenu() {
  const container = document.getElementById('customer-menu-grid');
  if (!container) return;
  if (menuItems.length === 0) {
    container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--muted);">No catering options found. Add items via the Admin Panel.</p>`;
    return;
  }
  container.innerHTML = menuItems.map(item => `
    <div class="menu-card">
      <img src="${item.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c'}" alt="${item.name}">
      <div class="menu-card-body">
        <div class="menu-card-title">${item.name}</div>
        <div class="menu-card-price">₹${parseFloat(item.price).toFixed(2)}</div>
        <p style="font-size:0.8rem; font-weight:bold; color:var(--saffron); margin-bottom:0.5rem;">${item.category}</p>
        <div class="menu-card-desc">${item.description || 'No description provided.'}</div>
      </div>
    </div>
  `).join('');
}

function renderAdminMenu() {
  const container = document.getElementById('admin-menu-grid');
  if (!container) return;
  if (menuItems.length === 0) {
    container.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--muted);">No dashboard items found.</p>`;
    return;
  }
  container.innerHTML = menuItems.map(item => `
    <div class="menu-card">
      <img src="${item.image}" alt="${item.name}">
      <div class="menu-card-body">
        <div class="menu-card-title">${item.name}</div>
        <div class="menu-card-price">₹${parseFloat(item.price).toFixed(2)}</div>
        <div style="display:flex; gap:0.5rem; margin-top:1rem;">
          <button class="btn btn-secondary" style="flex:1; padding:0.5rem;" onclick="openEditModal('${item.id}')">Edit</button>
          <button class="btn btn-danger" style="flex:1; padding:0.5rem;" onclick="deleteCloudItem('${item.id}')">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ── FETCH EXISTING CLOUDINARY MEDIA IMAGES ─────────────────────
function fetchCloudLibrary() {
  const grid = document.getElementById('modal-library-grid');
  grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; font-size:0.8rem;">Loading library images...</p>';
  
  fetch('/api/images')
    .then(res => res.json())
    .then(data => {
      if (!data.images || data.images.length === 0) {
        grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; font-size:0.8rem;">Library folder empty.</p>';
        return;
      }
      grid.innerHTML = data.images.map(img => `
        <img class="library-item" src="${img.url}" data-filename="${img.filename}" onclick="selectLibraryImage(this)">
      `).join('');
    })
    .catch(() => grid.innerHTML = '<p style="grid-column:1/-1; text-align:center; font-size:0.8rem; color:var(--danger);">Failed to query library.</p>');
}

function selectLibraryImage(imgElement) {
  document.querySelectorAll('.library-item').forEach(el => el.classList.remove('selected'));
  imgElement.classList.add('selected');
  
  // Clear local file choice if library tab is selected
  document.getElementById('mi-img-file').value = '';
  targetUploadedFile = null;

  updatePreview(imgElement.src, imgElement.dataset.filename);
}

function handleFileSelect(e) {
  if (e.target.files && e.target.files[0]) {
    targetUploadedFile = e.target.files[0];
    
    // Clear library selections if a fresh local file is loaded
    document.querySelectorAll('.library-item').forEach(el => el.classList.remove('selected'));
    
    const reader = new FileReader();
    reader.onload = function(event) {
      updatePreview(event.target.result, '');
    }
    reader.readAsDataURL(targetUploadedFile);
  }
}

function updatePreview(url, filename) {
  document.getElementById('mi-selected-url').value = url;
  document.getElementById('mi-selected-filename').value = filename;
  
  const previewBox = document.getElementById('preview-box');
  const previewImg = document.getElementById('img-preview-element');
  previewBox.style.display = 'block';
  previewImg.src = url;
}

// ── MUTATION CORE LOGIC ────────────────────────────────────────
function openAddModal() {
  document.getElementById('modal-title').textContent = "Add Menu Item";
  document.getElementById('edit-item-id').value = "";
  openModal('menu-item-modal');
}

function openEditModal(itemId) {
  const item = menuItems.find(i => i.id === itemId);
  if (!item) return;
  
  document.getElementById('modal-title').textContent = "Edit Menu Item";
  document.getElementById('edit-item-id').value = item.id;
  document.getElementById('mi-name').value = item.name;
  document.getElementById('mi-price').value = item.price;
  document.getElementById('mi-category').value = item.category;
  document.getElementById('mi-description').value = item.description || '';
  
  updatePreview(item.image, item.cloudinary_id || item.id);
  openModal('menu-item-modal');
}

function handleFormSubmit(e) {
  e.preventDefault();
  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = "Saving to Cloud...";

  const editId = document.getElementById('edit-item-id').value;
  const name = document.getElementById('mi-name').value;
  const price = document.getElementById('mi-price').value;
  const category = document.getElementById('mi-category').value;
  const description = document.getElementById('mi-description').value;
  const selectedUrl = document.getElementById('mi-selected-url').value;
  const selectedFilename = document.getElementById('mi-selected-filename').value;

  // SCENARIO A: User picked a brand new local file layout, stream immediately
  if (targetUploadedFile) {
    const formData = new FormData();
    formData.append('image', targetUploadedFile);
    formData.append('name', name);
    formData.append('price', price);
    formData.append('category', category);
    formData.append('description', description);

    // If updating an existing item but replacing its image file, delete the old file first
    if (editId) {
      fetch('/api/delete-image', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: editId })
      }).catch(err => console.log("Old file clear fallback:", err));
    }

    fetch('/api/upload-image', {
      method: 'POST',
      body: formData
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) finalizeSave();
      else alert("Cloudinary connection failed: " + data.error);
    })
    .catch(() => alert("Network exception uploading asset."));
  } 
  // SCENARIO B: Re-linking existing image library choice or updating text metadata fields
  else if (editId && selectedUrl) {
    // To update text variables when the image asset isn't modified, we remove the existing cloud record
    // and recreate its metadata signature inside Cloudinary instantly.
    fetch('/api/delete-image', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: selectedFilename || editId })
    })
    .then(() => {
      // Re-upload proxy payload mapping text structures back into cloud records
      const formData = new FormData();
      formData.append('name', name);
      formData.append('price', price);
      formData.append('category', category);
      formData.append('description', description);
      
      // Pass standard placeholder image if the client cache lacks an active file stream
      return fetch(selectedUrl)
        .then(res => res.blob())
        .then(blob => {
          formData.append('image', blob, 'menu-item.jpg');
          return fetch('/api/upload-image', { method: 'POST', body: formData });
        });
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) finalizeSave();
    });
  } else {
    alert("Please upload a file or select an image asset from the library archive tab.");
    saveBtn.disabled = false;
    saveBtn.textContent = "Save Changes";
  }
}

function finalizeSave() {
  loadSyncMenuFromServer();
  closeModal('menu-item-modal');
}

function deleteCloudItem(itemId) {
  if (!confirm("Are you sure you want to permanently delete this menu item from all network devices?")) return;
  
  fetch('/api/delete-image', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ filename: itemId })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      loadSyncMenuFromServer();
    } else {
      alert("Failed to delete item from cloud storage.");
    }
  })
  .catch(() => alert("Network error deleting item."));
}

function resetFormFields() {
  document.getElementById('menu-form').reset();
  document.getElementById('edit-item-id').value = '';
  document.getElementById('mi-selected-url').value = '';
  document.getElementById('mi-selected-filename').value = '';
  document.getElementById('preview-box').style.display = 'none';
  document.getElementById('img-preview-element').src = '';
  document.querySelectorAll('.library-item').forEach(el => el.classList.remove('selected'));
  targetUploadedFile = null;
  
  const saveBtn = document.getElementById('save-btn');
  saveBtn.disabled = false;
  saveBtn.textContent = "Save Changes";
  switchImgTab('upload');
}

// ── INITIALIZATION ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  loadSyncMenuFromServer();
  
  // Clean Enter/Escape handling optimization for desktop operations
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeModal('menu-item-modal');
    }
  });
});
</script>
</body>
</html>
